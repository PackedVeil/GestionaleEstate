{% extends 'base.html' %}

{% block title %}Accesso Admin - CampHero{% endblock %}

{% block content %}
<section class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon"><i class="fa-solid fa-lock"></i></div>
            <h2>Accesso Amministratore</h2>
            <p>Accedi con le tue credenziali per gestire la programmazione delle attività.</p>
        </div>
        
        <form action="{{ url_for('login') }}" method="POST" class="styled-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" name="username" id="username" placeholder="Inserisci il tuo username" required class="form-control pad-left">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-key input-icon"></i>
                    <input type="password" name="password" id="password" placeholder="Inserisci la tua password" required class="form-control pad-left">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block"><i class="fa-solid fa-right-to-bracket"></i> Accedi</button>
        </form>
        
        <div class="auth-footer">
            <p>Sei un nuovo organizzatore? <a href="{{ url_for('register') }}">Registrati qui</a></p>
        </div>
    </div>
</section>
{% endblock %}
