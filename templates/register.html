{% extends 'base.html' %}

{% block title %}Registrazione Admin - CampHero{% endblock %}

{% block content %}
<section class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon"><i class="fa-solid fa-user-plus"></i></div>
            <h2>Registrazione Organizzatore</h2>
            <p>Crea un nuovo account per gestire le attività del centro estivo.</p>
        </div>
        
        <form action="{{ url_for('register') }}" method="POST" class="styled-form">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" name="username" id="username" placeholder="Scegli un username" required class="form-control pad-left">
                </div>
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-key input-icon"></i>
                    <input type="password" name="password" id="password" placeholder="Crea una password sicura" required class="form-control pad-left">
                </div>
            </div>

            <div class="form-group">
                <label for="invite_code" class="form-label">Codice Invito Registrazione</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-ticket input-icon"></i>
                    <input type="text" name="invite_code" id="invite_code" placeholder="Inserisci il codice di invito" required class="form-control pad-left">
                </div>
                <!-- <small class="form-hint">
                    <i class="fa-solid fa-info-circle"></i> Per testare l'app usa il codice: <strong>{{ invite_code_hint }}</strong>
                </small> -->
            </div>
            
            <button type="submit" class="btn btn-primary btn-block"><i class="fa-solid fa-user-check"></i> Registrati</button>
        </form>
        
        <div class="auth-footer">
            <p>Hai già un account? <a href="{{ url_for('login') }}">Accedi qui</a></p>
        </div>
    </div>
</section>
{% endblock %}
